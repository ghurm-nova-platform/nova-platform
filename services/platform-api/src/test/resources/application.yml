spring:
  profiles:
    active: test
  datasource:
    url: jdbc:h2:mem:nova;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration

nova:
  security:
    jwt:
      # Test-only secret (>= 256 bits). Never use in production.
      secret: "test-only-jwt-secret-key-32bytes-minimum!!"
      issuer: nova-platform-test
      access-token-ttl: PT15M
      refresh-token-ttl: P7D
  agents:
    allowed-providers:
      - OPENAI
      - ANTHROPIC
      - GOOGLE
      - AZURE_OPENAI
      - LOCAL
  agent-runtime:
    enabled: false
  prompts:
    max-content-length: 50000
    max-tags: 20
    max-tag-length: 100
  conversation:
    max-context-messages: 20
    max-context-characters: 30000
    max-message-characters: 10000
    max-title-length: 255
    store-system-message: false
    store-tool-messages: true
  tools:
    max-schema-characters: 20000
    max-input-characters: 20000
    max-output-characters: 50000
    max-tool-calls-per-execution: 5
    max-orchestration-rounds: 5
    default-timeout-seconds: 10
    maximum-timeout-seconds: 30
    enabled: true
  knowledge:
    max-file-bytes: 10485760
    max-extracted-characters: 1000000
    max-chunks-per-document: 5000
    default-chunk-size: 1000
    default-chunk-overlap: 150
    max-document-key-length: 100
    pdf-enabled: false
    pdf-max-pages: 200
    max-vector-candidates: 10000
    default-top-k: 5
    maximum-top-k: 20
    default-minimum-score: 0.0
    max-retrieved-characters: 20000
    max-query-characters: 10000
    retrieval-enabled: true
  model-gateway:
    enabled: true
    max-input-characters: 200000
    max-system-characters: 50000
    max-message-characters: 100000
    max-messages: 200
    max-output-characters: 200000
    maximum-output-tokens: 32768
    default-timeout-seconds: 60
    maximum-timeout-seconds: 300
    max-provider-attempts: 5
    max-total-duration-ms: 300000
    max-concurrent-requests-per-provider: 100
    invoke-executor-pool-size: 32
    invoke-executor-queue-capacity: 32
    invoke-cancel-grace-ms: 5000
    retry-backoff-maximum-ms: 10000
    usage-enabled: true
    cost-estimation-enabled: true
    providers:
      openai:
        base-url: ${NOVA_OPENAI_BASE_URL:}
      azure-openai:
        base-url-template: ${NOVA_AZURE_OPENAI_BASE_URL_TEMPLATE:}
  orchestration:
    enabled: false
    poll-interval-ms: 2000
    claim-limit: 10
    claim-lease-seconds: 30
    maximum-parallel-tasks: 20
    global-concurrency: 20
    dispatch-pool-size: 20
    dispatch-queue-capacity: 40
    maximum-task-attempts: 10
    maximum-task-timeout-seconds: 600
    maximum-run-duration-ms: 3600000
    retry-backoff-cap-ms: 60000
    worker-id: platform-api-test
    max-json-chars: 100000
    max-objective-length: 4000
  planner:
    enabled: true
    max-objective-length: 4000
    max-tasks: 50
    max-dependencies: 200
    cost-per-thousand-tokens-usd: 0.002
    default-provider: LOCAL
    default-model: planner-local
  secrets:
    # Test-only 32-byte AES key (all zeros). Never use in production.
    master-key: "AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA="
