spring:
  datasource:
    url: jdbc:h2:mem:nova;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration

nova:
  security:
    jwt:
      # Test-only secret (>= 256 bits). Never use in production.
      secret: "test-only-jwt-secret-key-32bytes-minimum!!"
      issuer: nova-platform-test
      access-token-ttl: PT15M
      refresh-token-ttl: P7D
  agents:
    allowed-providers:
      - OPENAI
      - ANTHROPIC
      - GOOGLE
      - AZURE_OPENAI
      - LOCAL
  agent-runtime:
    enabled: false
  prompts:
    max-content-length: 50000
    max-tags: 20
    max-tag-length: 100
  conversation:
    max-context-messages: 20
    max-context-characters: 30000
    max-message-characters: 10000
    max-title-length: 255
    store-system-message: false
    store-tool-messages: true
  tools:
    max-schema-characters: 20000
    max-input-characters: 20000
    max-output-characters: 50000
    max-tool-calls-per-execution: 5
    max-orchestration-rounds: 5
    default-timeout-seconds: 10
    maximum-timeout-seconds: 30
    enabled: true
  knowledge:
    max-file-bytes: 10485760
    max-extracted-characters: 1000000
    max-chunks-per-document: 5000
    default-chunk-size: 1000
    default-chunk-overlap: 150
    max-document-key-length: 100
    pdf-enabled: false
    pdf-max-pages: 200
    max-vector-candidates: 10000
    default-top-k: 5
    maximum-top-k: 20
    default-minimum-score: 0.0
    max-retrieved-characters: 20000
    max-query-characters: 10000
    retrieval-enabled: true
