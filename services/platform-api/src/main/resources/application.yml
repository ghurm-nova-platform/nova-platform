server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: ${SPRING_APPLICATION_NAME:platform-api}
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/nova}
    username: ${DATABASE_USERNAME:nova}
    password: ${DATABASE_PASSWORD:nova_local_only}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration

nova:
  security:
    jwt:
      secret: ${JWT_SECRET}
      issuer: ${JWT_ISSUER:nova-platform}
      access-token-ttl: ${JWT_ACCESS_TTL:PT15M}
      refresh-token-ttl: ${JWT_REFRESH_TTL:P7D}

management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
      probes:
        enabled: true
  info:
    env:
      enabled: false

logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    ai.nova.platform: ${LOG_LEVEL_APP:INFO}
  pattern:
    console: "%d{ISO8601} [%thread] %-5level correlationId=%X{correlationId} %logger{36} - %msg%n"

---
spring:
  config:
    activate:
      on-profile: json-logs

logging:
  structured:
    format:
      console: logstash
