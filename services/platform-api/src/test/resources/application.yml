spring:
  datasource:
    url: jdbc:h2:mem:nova;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration

nova:
  security:
    jwt:
      # Test-only secret (>= 256 bits). Never use in production.
      secret: "test-only-jwt-secret-key-32bytes-minimum!!"
      issuer: nova-platform-test
      access-token-ttl: PT15M
      refresh-token-ttl: P7D
  agents:
    allowed-providers:
      - OPENAI
      - ANTHROPIC
      - GOOGLE
      - AZURE_OPENAI
      - LOCAL
  agent-runtime:
    enabled: false
