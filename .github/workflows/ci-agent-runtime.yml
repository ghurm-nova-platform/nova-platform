name: CI Agent Runtime

on:
  pull_request:
    paths:
      - "services/agent-runtime/**"
      - ".github/workflows/ci-agent-runtime.yml"
  push:
    branches:
      - sprint-0/foundation
      - main
    paths:
      - "services/agent-runtime/**"
      - ".github/workflows/ci-agent-runtime.yml"
  workflow_dispatch:

concurrency:
  group: ci-agent-runtime-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  agent-runtime:
    name: Python Agent Runtime
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: services/agent-runtime
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: "2.4.1"
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Load cached venv
        uses: actions/cache@v4
        with:
          path: services/agent-runtime/.venv
          key: venv-${{ runner.os }}-py3.12-${{ hashFiles('services/agent-runtime/poetry.lock') }}

      - name: Install and sync dependencies
        run: poetry install --no-interaction --sync

      - name: Ruff
        run: poetry run ruff check src tests

      - name: Mypy
        run: poetry run mypy

      - name: Pytest
        run: poetry run pytest
