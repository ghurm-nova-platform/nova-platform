server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: ${SPRING_APPLICATION_NAME:platform-api}
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/nova}
    username: ${DATABASE_USERNAME:nova}
    password: ${DATABASE_PASSWORD:nova_local_only}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration

nova:
  security:
    jwt:
      secret: ${JWT_SECRET}
      issuer: ${JWT_ISSUER:nova-platform}
      access-token-ttl: ${JWT_ACCESS_TTL:PT15M}
      refresh-token-ttl: ${JWT_REFRESH_TTL:P7D}
  agents:
    allowed-providers:
      - OPENAI
      - ANTHROPIC
      - GOOGLE
      - AZURE_OPENAI
      - LOCAL
  agent-runtime:
    enabled: false
  prompts:
    max-content-length: 50000
    max-tags: 20
    max-tag-length: 100
  conversation:
    max-context-messages: 20
    max-context-characters: 30000
    max-message-characters: 10000
    max-title-length: 255
    store-system-message: false
    store-tool-messages: true
  tools:
    max-schema-characters: 20000
    max-input-characters: 20000
    max-output-characters: 50000
    max-tool-calls-per-execution: 5
    max-orchestration-rounds: 5
    default-timeout-seconds: 10
    maximum-timeout-seconds: 30
    enabled: true
  knowledge:
    max-file-bytes: 10485760
    max-extracted-characters: 1000000
    max-chunks-per-document: 5000
    default-chunk-size: 1000
    default-chunk-overlap: 150
    max-document-key-length: 100
    pdf-enabled: false
    pdf-max-pages: 200
    max-vector-candidates: 10000
    default-top-k: 5
    maximum-top-k: 20
    default-minimum-score: 0.0
    max-retrieved-characters: 20000
    max-query-characters: 10000
    retrieval-enabled: true
  model-gateway:
    enabled: true
    max-input-characters: 200000
    max-system-characters: 50000
    max-message-characters: 100000
    max-messages: 200
    max-output-characters: 200000
    maximum-output-tokens: 32768
    default-timeout-seconds: 60
    maximum-timeout-seconds: 300
    max-provider-attempts: 5
    max-total-duration-ms: 300000
    max-concurrent-requests-per-provider: 100
    invoke-executor-pool-size: 32
    invoke-executor-queue-capacity: 32
    invoke-cancel-grace-ms: 5000
    retry-backoff-maximum-ms: 10000
    usage-enabled: true
    cost-estimation-enabled: true
    providers:
      openai:
        # empty = production api.openai.com
        base-url: ${NOVA_OPENAI_BASE_URL:}
      azure-openai:
        # empty = https://{resource}.openai.azure.com
        base-url-template: ${NOVA_AZURE_OPENAI_BASE_URL_TEMPLATE:}
  orchestration:
    enabled: true
    poll-interval-ms: 2000
    claim-limit: 10
    claim-lease-seconds: 30
    maximum-parallel-tasks: 20
    global-concurrency: 20
    dispatch-pool-size: 20
    dispatch-queue-capacity: 40
    maximum-task-attempts: 10
    maximum-task-timeout-seconds: 600
    maximum-run-duration-ms: 3600000
    retry-backoff-cap-ms: 60000
    worker-id: platform-api
    max-json-chars: 100000
    max-objective-length: 4000
  planner:
    enabled: true
    max-objective-length: 4000
    max-tasks: 50
    max-dependencies: 200
    cost-per-thousand-tokens-usd: 0.002
    default-provider: LOCAL
    default-model: planner-local
  coding:
    enabled: true
    max-artifacts: 40
    max-content-chars: 200000
    max-path-length: 1000
    default-provider: LOCAL
    default-model: coding-local
  review:
    enabled: true
    max-findings: 100
    max-artifact-chars-in-prompt: 120000
    default-provider: LOCAL
    default-model: review-local
  testing:
    enabled: true
    max-tests: 80
    max-cases-per-test: 20
    max-artifact-chars-in-prompt: 100000
    default-provider: LOCAL
    default-model: testing-local
  patch:
    enabled: true
    max-patch-chars: 500000
    max-files: 200
    max-artifact-chars-in-prompt: 100000
    max-path-length: 1000
    default-provider: LOCAL
    default-model: patch-local
  git:
    enabled: true
    workspace-root: ./.nova-git-workspaces
    base-ref: main
    author-name: Nova Git Agent
    author-email: git-agent@nova.local
    # Production must use a real source repository snapshot. Never synthetic-init on API requests.
    allow-init-repository: false
    # Failed operation workspaces are preserved for diagnosis by default.
    cleanup-failed-workspaces: false
  pull-request:
    enabled: false
    provider: GITHUB
    remote-name: origin
    target-base-ref: main
    allowed-base-refs: main,develop
    allowed-repository-hosts: github.com
    allow-force-push: false
    draft-by-default: true
    delete-branch-on-close: false
    request-timeout-seconds: 30
    github-api-base-url: https://api.github.com
    github-token: ${NOVA_GITHUB_TOKEN:}
  ci-observation:
    enabled: false
    provider: GITHUB
    request-timeout-seconds: 30
    github-api-base-url: https://api.github.com
    github-token: ${NOVA_GITHUB_TOKEN:}
    max-runs-per-observation: 20
  repair:
    enabled: false
    max-attempts: 5
    max-files: 20
    max-generated-lines: 1000
    allow-partial-repair: true
    require-review-before-repair: false
    default-provider: LOCAL
    default-model: repair-local
  secrets:
    master-key: ${NOVA_SECRET_MASTER_KEY:}

management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
      probes:
        enabled: true
  info:
    env:
      enabled: false

logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    ai.nova.platform: ${LOG_LEVEL_APP:INFO}
  pattern:
    console: "%d{ISO8601} [%thread] %-5level correlationId=%X{correlationId} %logger{36} - %msg%n"

---
spring:
  config:
    activate:
      on-profile: json-logs

logging:
  structured:
    format:
      console: logstash
