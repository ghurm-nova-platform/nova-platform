server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: ${SPRING_APPLICATION_NAME:platform-api}
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/nova}
    username: ${DATABASE_USERNAME:nova}
    password: ${DATABASE_PASSWORD:nova_local_only}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration

nova:
  security:
    jwt:
      secret: ${JWT_SECRET}
      issuer: ${JWT_ISSUER:nova-platform}
      access-token-ttl: ${JWT_ACCESS_TTL:PT15M}
      refresh-token-ttl: ${JWT_REFRESH_TTL:P7D}
  agents:
    allowed-providers:
      - OPENAI
      - ANTHROPIC
      - GOOGLE
      - AZURE_OPENAI
      - LOCAL
  agent-runtime:
    enabled: false
  prompts:
    max-content-length: 50000
    max-tags: 20
    max-tag-length: 100
  conversation:
    max-context-messages: 20
    max-context-characters: 30000
    max-message-characters: 10000
    max-title-length: 255
    store-system-message: false
    store-tool-messages: true
  tools:
    max-schema-characters: 20000
    max-input-characters: 20000
    max-output-characters: 50000
    max-tool-calls-per-execution: 5
    max-orchestration-rounds: 5
    default-timeout-seconds: 10
    maximum-timeout-seconds: 30
    enabled: true
  knowledge:
    max-file-bytes: 10485760
    max-extracted-characters: 1000000
    max-chunks-per-document: 5000
    default-chunk-size: 1000
    default-chunk-overlap: 150
    max-document-key-length: 100
    pdf-enabled: false
    pdf-max-pages: 200
    max-vector-candidates: 10000
    default-top-k: 5
    maximum-top-k: 20
    default-minimum-score: 0.0
    max-retrieved-characters: 20000
    max-query-characters: 10000
    retrieval-enabled: true
  model-gateway:
    enabled: true
    max-input-characters: 200000
    max-system-characters: 50000
    max-message-characters: 100000
    max-messages: 200
    max-output-characters: 200000
    maximum-output-tokens: 32768
    default-timeout-seconds: 60
    maximum-timeout-seconds: 300
    max-provider-attempts: 5
    max-total-duration-ms: 300000
    max-concurrent-requests-per-provider: 100
    retry-backoff-maximum-ms: 10000
    usage-enabled: true
    cost-estimation-enabled: true

management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
      probes:
        enabled: true
  info:
    env:
      enabled: false

logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    ai.nova.platform: ${LOG_LEVEL_APP:INFO}
  pattern:
    console: "%d{ISO8601} [%thread] %-5level correlationId=%X{correlationId} %logger{36} - %msg%n"

---
spring:
  config:
    activate:
      on-profile: json-logs

logging:
  structured:
    format:
      console: logstash
